plugins:
  - rubocop-md
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rake

AllCops:
  NewCops: enable
  Exclude:
    - .git/**/*
    - vendor/bundle/**/*

Gemspec/RequiredRubyVersion:
  Enabled: false

Layout/EmptyLineAfterGuardClause:
  Enabled: false

Layout/IndentationConsistency:
  Exclude:
    - README.md

Layout/InitialIndentation:
  Exclude:
    - README.md

Layout/LineLength:
  Enabled: false

Layout/SpaceInsideHashLiteralBraces:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/ClassLength:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Lint/DuplicateBranch:
  Enabled: false

Naming/AccessorMethodName:
  Enabled: false

Naming/FileName:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/GuardClause:
  Enabled: false

Style/HashSyntax:
  Enabled: false

Style/MutableConstant:
  Enabled: false

# A keyword argument would break the public API on Ruby < 3.0, where a
# trailing options hash gets absorbed into keywords.
Style/OptionalBooleanParameter:
  Enabled: false

# Attribute-name matchers are intentionally compared with === so that a
# String matches exactly while a Regexp matches as a pattern.
Style/CaseEquality:
  Enabled: false
